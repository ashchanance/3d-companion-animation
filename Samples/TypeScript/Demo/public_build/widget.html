<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HARUKA Widget</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(215, 164, 52, 0.28), transparent 42%),
          linear-gradient(180deg, #0f1723, #09111b 72%);
        color: #f7f1e8;
        font: 500 14px/1.5 ui-sans-serif, system-ui, sans-serif;
      }

      .loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        text-align: center;
      }

      .loader-dot {
        width: 12px;
        height: 12px;
        border-radius: 999px;
        background: #d7a434;
        box-shadow: 0 0 18px rgba(215, 164, 52, 0.48);
        animation: pulse 1s ease-in-out infinite alternate;
      }

      a {
        color: #f7d28d;
      }

      @keyframes pulse {
        from { transform: scale(0.9); opacity: 0.6; }
        to { transform: scale(1.2); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div class="loader">
      <div class="loader-dot"></div>
      <strong>Launching HARUKA...</strong>
      <span>If the widget does not open automatically, <a id="open-link" href="/">open it here</a>.</span>
    </div>
    <script>
      (function () {
        var current = new URL(window.location.href);
        var target = new URL('./', current);
        current.searchParams.set('embed', '1');
        target.search = current.searchParams.toString();
        target.hash = current.hash;
        document.getElementById('open-link').href = target.toString();
        window.location.replace(target.toString());
      })();
    </script>
  </body>
</html>
